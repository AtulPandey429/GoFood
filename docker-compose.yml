# GoFood — MongoDB + API + React frontend
#
# Quick start:
#   cp .env.docker.example .env
#   docker compose up --build -d
#   open http://localhost
#
# Run deployment tests:
#   docker compose --profile test run --rm test

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      URL: mongodb://mongo:27017/gofood
      PORT: 3000
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI:-http://localhost/api/auth/discord/callback}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  test:
    image: node:20-alpine
    profiles: ["test"]
    working_dir: /app
    volumes:
      - ./scripts/docker-smoke-test.js:/app/docker-smoke-test.js:ro
    environment:
      API_URL: http://backend:3000
      FRONTEND_URL: http://frontend
    command: node docker-smoke-test.js
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  mongo_data:
